<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Agenda Amanda</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;700&family=Roboto:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --blue:#1a73e8;--blue-dark:#1557b0;--surface:#fff;--bg:#f6f8fc;
    --text:#202124;--text2:#5f6368;--text3:#80868b;--border:#dadce0;--hh:56px;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  body{font-family:'Roboto',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;}

  .top-bar{position:sticky;top:0;z-index:50;background:var(--blue);height:var(--hh);display:flex;align-items:center;justify-content:space-between;padding:0 16px;box-shadow:0 2px 8px rgba(0,0,0,.18);}
  .tbl{display:flex;align-items:center;gap:10px;}
  .avatar{width:36px;height:36px;border-radius:50%;background:rgba(255,255,255,.25);display:flex;align-items:center;justify-content:center;font-family:'Google Sans',sans-serif;font-weight:700;font-size:15px;color:#fff;}
  .ttl{font-family:'Google Sans',sans-serif;font-size:18px;font-weight:500;color:#fff;}
  .twk{font-size:12px;color:rgba(255,255,255,.8);margin-top:1px;}
  .tbr{display:flex;gap:4px;align-items:center;}
  .nav-btn{width:36px;height:36px;border-radius:50%;border:none;background:rgba(255,255,255,.15);color:#fff;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .15s;}
  .nav-btn:hover{background:rgba(255,255,255,.28);}
  .tod-btn{padding:0 14px;height:36px;border-radius:18px;border:1.5px solid rgba(255,255,255,.5);background:transparent;color:#fff;font-size:13px;font-weight:500;cursor:pointer;margin-right:4px;transition:background .15s;}
  .tod-btn:hover{background:rgba(255,255,255,.15);}
  .sdot{width:8px;height:8px;border-radius:50%;background:#4ade80;display:inline-block;animation:pulse 2s infinite;margin-left:4px;vertical-align:middle;}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

  .dstrip{display:grid;grid-template-columns:48px repeat(6,1fr);background:var(--surface);border-bottom:1px solid var(--border);position:sticky;top:var(--hh);z-index:40;}
  .dstrip-sp{border-right:1px solid var(--border);}
  .dch{text-align:center;padding:8px 2px 6px;border-right:1px solid var(--border);}
  .dch:last-child{border-right:none;}
  .dn{font-size:10px;font-weight:500;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;}
  .dnw{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:4px auto 0;}
  .dnw.today{background:var(--blue);}
  .dnum{font-family:'Google Sans',sans-serif;font-size:18px;font-weight:400;color:var(--text2);}
  .dnw.today .dnum{color:#fff;font-weight:700;}

  .cgrid{display:grid;grid-template-columns:48px repeat(6,1fr);background:var(--surface);}
  .tgut{background:var(--surface);border-right:1px solid var(--border);}
  .tc{height:48px;display:flex;align-items:flex-start;justify-content:flex-end;padding:2px 6px 0 0;font-size:10px;color:var(--text3);border-top:1px solid var(--border);}
  .tc.half{font-size:0;border-top-color:#efefef;}
  .dcol{border-right:1px solid var(--border);position:relative;}
  .dcol:last-child{border-right:none;}
  .gcell{height:48px;border-top:1px solid var(--border);}
  .gcell.hh{border-top-color:#efefef;}

  .evb{position:absolute;left:2px;right:2px;border-radius:6px;padding:3px 6px;cursor:pointer;overflow:hidden;z-index:5;display:flex;flex-direction:column;justify-content:space-between;transition:filter .15s,transform .1s;box-shadow:0 1px 3px rgba(0,0,0,.12);}
  .evb:hover{filter:brightness(.92);transform:scale(1.01);}
  .evb:active{transform:scale(.98);}
  .evt{display:flex;align-items:flex-start;justify-content:space-between;}
  .evn{font-size:11px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1;line-height:1.3;}
  .badge{width:16px;height:16px;border-radius:50%;background:rgba(255,255,255,.9);display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;flex-shrink:0;margin-left:2px;}
  .bok{color:#1e7e34;}
  .bno{color:#c0392b;}
  .evsub{font-size:9px;opacity:.8;margin-top:1px;}

  .mov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:200;align-items:flex-end;justify-content:center;}
  .mov.open{display:flex;}
  .msh{background:var(--surface);border-radius:20px 20px 0 0;width:100%;max-width:540px;max-height:88vh;overflow-y:auto;padding-bottom:16px;animation:su .22s ease;}
  @keyframes su{from{transform:translateY(100%);opacity:0}to{transform:translateY(0);opacity:1}}
  .mdrg{width:36px;height:4px;background:var(--border);border-radius:2px;margin:12px auto 0;}
  .mcs{height:5px;margin:14px 20px 0;border-radius:3px;}
  .mhdr{padding:14px 20px 0;display:flex;justify-content:space-between;align-items:flex-start;}
  .mtl{font-family:'Google Sans',sans-serif;font-size:20px;font-weight:500;color:var(--text);flex:1;}
  .mcb{width:32px;height:32px;border-radius:50%;border:none;background:var(--bg);cursor:pointer;font-size:18px;color:var(--text2);display:flex;align-items:center;justify-content:center;}
  .msub{padding:4px 20px 0;font-size:13px;color:var(--text2);}
  .mdiv{height:1px;background:var(--border);margin:16px 0;}
  .msl{font-size:11px;font-weight:500;color:var(--text3);text-transform:uppercase;letter-spacing:.7px;padding:0 20px;margin-bottom:10px;}
  .srow{display:flex;gap:10px;padding:0 20px;margin-bottom:16px;}
  .sbtn{flex:1;padding:11px 8px;border-radius:10px;border:1.5px solid var(--border);background:var(--bg);cursor:pointer;font-size:13px;font-weight:500;color:var(--text2);transition:all .15s;display:flex;align-items:center;justify-content:center;gap:6px;}
  .sbtn:hover{border-color:#aaa;}
  .sbtn.ok{background:#e6f4ea;border-color:#34a853;color:#137333;}
  .sbtn.no{background:#fce8e6;border-color:#ea4335;color:#c5221f;}
  .nta{margin:0 20px 16px;width:calc(100% - 40px);min-height:90px;border:1.5px solid var(--border);border-radius:10px;padding:12px;font-size:14px;font-family:'Roboto',sans-serif;color:var(--text);background:var(--bg);resize:none;transition:border-color .15s;}
  .nta:focus{outline:none;border-color:var(--blue);background:#fff;}
  .svb{display:block;margin:0 20px 20px;width:calc(100% - 40px);padding:14px;background:var(--blue);color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:500;font-family:'Google Sans',sans-serif;cursor:pointer;transition:background .15s;}
  .svb:hover{background:var(--blue-dark);}

  .lsc{position:fixed;inset:0;background:var(--blue);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:999;transition:opacity .4s;}
  .lsc.hidden{opacity:0;pointer-events:none;}
  .lsl{font-family:'Google Sans',sans-serif;font-size:28px;font-weight:700;color:#fff;margin-bottom:8px;}
  .lss{font-size:14px;color:rgba(255,255,255,.75);margin-bottom:32px;}
  .lsp{width:32px;height:32px;border:3px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .8s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg)}}
  .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:#323232;color:#fff;padding:10px 20px;border-radius:8px;font-size:13px;z-index:300;transition:transform .25s;white-space:nowrap;}
  .toast.show{transform:translateX(-50%) translateY(0);}
  .errbanner{background:#fce8e6;color:#c5221f;padding:12px 16px;font-size:13px;text-align:center;}
</style>
</head>
<body>

<div class="lsc" id="lsc">
  <div class="lsl">📅 Agenda Amanda</div>
  <div class="lss">Carregando horários...</div>
  <div class="lsp"></div>
</div>

<div class="top-bar">
  <div class="tbl">
    <div class="avatar">A</div>
    <div>
      <div class="ttl">Amanda <span class="sdot" id="sdot" style="display:none"></span></div>
      <div class="twk" id="wklbl">–</div>
    </div>
  </div>
  <div class="tbr">
    <button class="tod-btn" onclick="goToday()">Hoje</button>
    <button class="nav-btn" onclick="changeWeek(-1)">&#8249;</button>
    <button class="nav-btn" onclick="changeWeek(1)">&#8250;</button>
  </div>
</div>

<div class="dstrip" id="dstrip"><div class="dstrip-sp"></div></div>
<div class="cgrid" id="cgrid"></div>

<div class="mov" id="mov" onclick="ovcl(event)">
  <div class="msh">
    <div class="mdrg"></div>
    <div class="mcs" id="mcs"></div>
    <div class="mhdr">
      <div class="mtl" id="mtl">–</div>
      <button class="mcb" onclick="closeModal()">✕</button>
    </div>
    <div class="msub" id="msub">–</div>
    <div class="mdiv"></div>
    <div class="msl">Status do atendimento</div>
    <div class="srow">
      <button class="sbtn" id="bok" onclick="setSt('ok')">✓ Atendido</button>
      <button class="sbtn" id="bno" onclick="setSt('nao')">✗ Não atendido</button>
    </div>
    <div class="msl">Anotações</div>
    <textarea class="nta" id="nta" placeholder="Observações sobre este atendimento..."></textarea>
    <button class="svb" onclick="saveNote()">Salvar</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const fbApp = initializeApp({
  apiKey:"AIzaSyDFOE5pTnPN_PNjlIypxTKToxhiHlSOoTs",
  authDomain:"teste-6db76.firebaseapp.com",
  projectId:"teste-6db76",
  storageBucket:"teste-6db76.firebasestorage.app",
  messagingSenderId:"823801776195",
  appId:"1:823801776195:web:8c6502f5491d6b46bc6cf6"
});
const db = getFirestore(fbApp);

const SHEET_ID = '1kItQnxGftlSwHtsTZRhd4ESFfKE6Wltz';
const API_KEY  = 'AIzaSyDFOE5pTnPN_PNjlIypxTKToxhiHlSOoTs';
const SHEET_NAME = 'HORÁRIOS PROFISSIONAIS';

const DAY_SHORT = ['SEG','TER','QUA','QUI','SEX','SÁB'];
const DAY_FULL  = ['Segunda','Terça','Quarta','Quinta','Sexta','Sábado'];
const SLOTS = [];
for(let h=7;h<19;h++){SLOTS.push(`${h}:00`);SLOTS.push(`${h}:30`);}

let weekOff=0, events=[], notes={}, curKey=null, curSt=null;

// ── Sheets API with merge expansion ──────────────────────
async function fetchGrid() {
  const enc = encodeURIComponent(SHEET_NAME);
  const url = `https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}?includeGridData=true&ranges=${enc}&key=${API_KEY}`;
  const r = await fetch(url);
  if(!r.ok) throw new Error('Sheets API: '+r.status+' '+await r.text());
  const data = await r.json();
  const sheet = data.sheets[0];
  const rowData = sheet.data[0].rowData || [];
  const merges  = sheet.merges || [];

  // Build 2D array of {val, bg}
  const grid = rowData.map(row =>
    (row.values || []).map(cell => {
      const ev = cell.effectiveValue;
      let val = '';
      if(ev){
        if(ev.stringValue !== undefined) val = ev.stringValue;
        else if(ev.numberValue !== undefined) val = String(ev.numberValue);
      }
      const fmt = cell.effectiveFormat || {};
      const bc  = fmt.backgroundColor || {};
      const r255 = Math.round((bc.red||0)*255);
      const g255 = Math.round((bc.green||0)*255);
      const b255 = Math.round((bc.blue||0)*255);
      const isWhite = r255>250 && g255>250 && b255>250;
      const bg = (!isWhite && (bc.red!==undefined||bc.green!==undefined)) ? `rgb(${r255},${g255},${b255})` : null;
      return {val, bg};
    })
  );

  // Expand merges
  merges.forEach(({startRowIndex:r0,endRowIndex:r1,startColumnIndex:c0,endColumnIndex:c1})=>{
    const src = grid[r0]?.[c0] || {val:'',bg:null};
    for(let r=r0;r<r1;r++) for(let c=c0;c<c1;c++){
      if(r===r0&&c===c0) continue;
      if(!grid[r]) grid[r]=[];
      grid[r][c] = {...src};
    }
  });
  return grid;
}

// ── Parse Amanda's schedule from the expanded grid ───────
function parseAmanda(grid) {
  // Find AMANDA header cell
  let aRow=-1, aCol=-1;
  outer: for(let r=0;r<grid.length;r++){
    for(let c=0;c<(grid[r]||[]).length;c++){
      const v=(grid[r][c]?.val||'').trim().toUpperCase();
      if(v==='AMANDA'||v.startsWith('AMANDA ')){aRow=r;aCol=c;break outer;}
    }
  }
  if(aRow===-1) return [];

  // Find the row that contains day names (Segunda, Terça...) — typically aRow or aRow+1
  // and the col containing times
  const dayKw=['segunda','terça','terca','quarta','quinta','sexta','sábado','sabado'];
  let dayRow=aRow, timeCol=-1, dayStartCol=aCol;

  // Check aRow+1 for day names
  const nr=grid[aRow+1]||[];
  if(nr.some(c=>dayKw.some(k=>(c?.val||'').toLowerCase().includes(k)))){
    dayRow=aRow+1;
  }

  // Find time col: first col with a "H:MM" pattern in the rows below dayRow
  for(let c=0;c<(grid[dayRow+1]||[]).length;c++){
    if(/^\d{1,2}:\d{2}$/.test((grid[dayRow+1]?.[c]?.val||'').trim())){
      timeCol=c; break;
    }
  }

  // Determine day cols: from the header row (aRow), the 6 days start at aCol
  // Verify by checking that aCol..aCol+5 cols have day-name content in dayRow
  // (they might have the day name merged into the header)
  // We'll trust aCol+0..5 based on CSV analysis showing that structure

  const dataStart = dayRow+1;
  const skip = new Set(['','almoço','almoco','dia da semana']);
  const colorRules=[
    {re:/daniel/i,             bg:'#34a853',tx:'#fff'},
    {re:/éster|ester/i,        bg:'#ea4335',tx:'#fff'},
    {re:/supervisão|supervisao/i,bg:'#fbbc04',tx:'#3d2c00'},
    {re:/davi/i,               bg:'#1a73e8',tx:'#fff'},
    {re:/cecília|cecilia/i,    bg:'#ab47bc',tx:'#fff'},
    {re:/lucas saeki/i,        bg:'#00897b',tx:'#fff'},
    {re:/lucas/i,              bg:'#c2185b',tx:'#fff'},
    {re:/clínica|clinica/i,    bg:'#607d8b',tx:'#fff'},
    {re:/mestrado/i,           bg:'#ff7043',tx:'#fff'},
  ];

  function getColor(name, cellBg){
    if(cellBg){
      const m=cellBg.match(/rgb\((\d+),(\d+),(\d+)\)/);
      if(m){
        const lum=.299*+m[1]+.587*+m[2]+.114*+m[3];
        return {bg:cellBg, tx:lum>160?'#3d2c00':'#fff'};
      }
    }
    for(const r of colorRules) if(r.re.test(name)) return {bg:r.bg,tx:r.tx};
    let h=0; for(let i=0;i<name.length;i++) h=name.charCodeAt(i)+((h<<5)-h);
    return {bg:`hsl(${Math.abs(h)%360},55%,42%)`,tx:'#fff'};
  }

  const evs=[];
  // Stop row: find next professional header after dataStart
  let stopRow=grid.length;
  for(let r=dataStart+2;r<grid.length;r++){
    const row=grid[r]||[];
    for(let c=aCol;c<aCol+6;c++){
      const v=(row[c]?.val||'').trim().toUpperCase();
      // Detect another professional's name (all-caps word, not a time or known value)
      if(v.length>2&&/^[A-ZÁÉÍÓÚÀÂÊÔÃÕÇÜ\s]+$/.test(v)&&!dayKw.some(k=>v.toLowerCase()===k)&&!/^\d/.test(v)&&v!=='AMANDA'){
        // Check if it looks like a name (not an appointment)
        // A name cell at a day column without a time pattern is suspicious
        const prevCellsEmpty=([0,1,2,3,4,5].every(d=>{
          const prev=(grid[r-1]?.[aCol+d]?.val||'').trim();
          return !prev||skip.has(prev.toLowerCase());
        }));
        if(prevCellsEmpty){stopRow=r;break;}
      }
    }
    if(stopRow!==grid.length) break;
  }

  for(let dayIdx=0;dayIdx<6;dayIdx++){
    const col=aCol+dayIdx;
    let ri=dataStart;
    while(ri<stopRow){
      const row=grid[ri]||[];
      const tval=(timeCol>=0?(grid[ri]?.[timeCol]?.val||''):'').trim();
      const cell=row[col]||{val:'',bg:null};
      const cval=cell.val.trim();

      if(!cval||skip.has(cval.toLowerCase())||/^(segunda|terça|terca|quarta|quinta|sexta|sábado|sabado|amanda)/i.test(cval)){
        ri++; continue;
      }

      // Count consecutive rows with same value (merged cell span)
      let span=1;
      while(ri+span<stopRow&&(grid[ri+span]?.[col]?.val||'').trim()===cval) span++;

      const endRow=ri+span;
      const endTime=(timeCol>=0?(grid[endRow]?.[timeCol]?.val||''):'').trim();
      const startTime=tval;

      if(startTime&&/^\d{1,2}:\d{2}$/.test(startTime)){
        const col2=getColor(cval,cell.bg);
        evs.push({day:dayIdx,start:startTime,end:endTime||addMins(startTime,span*30),name:cval,bg:col2.bg,tx:col2.tx,span});
      }
      ri+=span;
    }
  }
  return evs;
}

function addMins(t,m){const[h,mm]=t.split(':').map(Number);const tot=h*60+mm+m;return `${Math.floor(tot/60)}:${String(tot%60).padStart(2,'0')}`;}

// ── Firebase ──────────────────────────────────────────────
async function loadNotes(){try{const s=await getDoc(doc(db,'amanda','notes'));if(s.exists())notes=s.data();}catch(e){console.warn(e);}}
async function saveNotes(){try{await setDoc(doc(db,'amanda','notes'),notes);}catch(e){toast('Erro ao salvar.');}}

// ── Week ──────────────────────────────────────────────────
function monday(off){const d=new Date();d.setDate(d.getDate()-d.getDay()+(d.getDay()===0?-6:1)+off*7);d.setHours(0,0,0,0);return d;}
function fmtD(d){return d.toLocaleDateString('pt-BR',{day:'numeric',month:'short'});}
window.changeWeek=d=>{weekOff+=d;render();};
window.goToday=()=>{weekOff=0;render();};

// ── Event key ─────────────────────────────────────────────
function ekey(ev,ds){return `${ds}_d${ev.day}_${ev.start}_${ev.name.replace(/\s+/g,'_')}`;}

// ── Render ────────────────────────────────────────────────
function render(){
  const mon=monday(weekOff);
  const days=Array.from({length:6},(_,i)=>{const d=new Date(mon);d.setDate(mon.getDate()+i);return d;});
  const tod=new Date();tod.setHours(0,0,0,0);

  document.getElementById('wklbl').textContent=fmtD(days[0])+' – '+fmtD(days[5]);

  const strip=document.getElementById('dstrip');
  strip.innerHTML='<div class="dstrip-sp"></div>';
  days.forEach((d,i)=>{
    const isT=d.getTime()===tod.getTime();
    const el=document.createElement('div');
    el.className='dch';
    el.innerHTML=`<div class="dn">${DAY_SHORT[i]}</div><div class="dnw${isT?' today':''}"><span class="dnum">${d.getDate()}</span></div>`;
    strip.appendChild(el);
  });

  const grid=document.getElementById('cgrid');
  grid.innerHTML='';

  // Gutter
  const gut=document.createElement('div');gut.className='tgut';
  SLOTS.forEach(s=>{const tc=document.createElement('div');tc.className='tc'+(s.endsWith(':30')?' half':'');tc.textContent=s.endsWith(':00')?s:'';gut.appendChild(tc);});
  grid.appendChild(gut);

  days.forEach((d,di)=>{
    const col=document.createElement('div');col.className='dcol';
    const ds=d.toISOString().slice(0,10);
    SLOTS.forEach(s=>{const c=document.createElement('div');c.className='gcell'+(s.endsWith(':30')?' hh':'');col.appendChild(c);});

    events.filter(ev=>ev.day===di).forEach(ev=>{
      const si=SLOTS.indexOf(ev.start);
      const ei=SLOTS.indexOf(ev.end);
      if(si===-1)return;
      const span=ei>si?ei-si:ev.span||1;
      const key=ekey(ev,ds);
      const note=notes[key]||{};
      let badge='';
      if(note.status==='ok') badge='<span class="badge bok">✓</span>';
      if(note.status==='nao') badge='<span class="badge bno">✗</span>';
      const el=document.createElement('div');
      el.className='evb';
      el.style.cssText=`background:${ev.bg};color:${ev.tx};top:${si*48+2}px;height:${span*48-4}px;`;
      el.innerHTML=`<div class="evt"><span class="evn">${ev.name}</span>${badge}</div>${span>1?`<span class="evsub">${ev.start} – ${ev.end}</span>`:''}`;
      el.onclick=()=>openModal(ev,key);
      col.appendChild(el);
    });
    grid.appendChild(col);
  });
}

// ── Modal ─────────────────────────────────────────────────
function openModal(ev,key){
  curKey=key;curSt=(notes[key]||{}).status||null;
  document.getElementById('mcs').style.background=ev.bg;
  document.getElementById('mtl').textContent=ev.name;
  document.getElementById('msub').textContent=`${DAY_FULL[ev.day]} · ${ev.start} – ${ev.end}`;
  document.getElementById('nta').value=(notes[key]||{}).text||'';
  updBtns();
  document.getElementById('mov').classList.add('open');
}
window.closeModal=()=>{document.getElementById('mov').classList.remove('open');curKey=curSt=null;};
window.ovcl=e=>{if(e.target===document.getElementById('mov'))closeModal();};
window.setSt=s=>{curSt=curSt===s?null:s;updBtns();};
function updBtns(){
  document.getElementById('bok').className='sbtn'+(curSt==='ok'?' ok':'');
  document.getElementById('bno').className='sbtn'+(curSt==='nao'?' no':'');
}
window.saveNote=async()=>{
  if(!curKey)return;
  notes[curKey]={status:curSt,text:document.getElementById('nta').value,updatedAt:new Date().toISOString()};
  await saveNotes();
  closeModal();render();toast('Salvo!');
};

function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500);}

// ── Init ──────────────────────────────────────────────────
async function init(){
  try{
    const [grid]=await Promise.all([fetchGrid(),loadNotes()]);
    events=parseAmanda(grid);
    document.getElementById('sdot').style.display='inline-block';
    render();
  }catch(e){
    console.error(e);
    document.body.insertAdjacentHTML('afterbegin',`<div class="errbanner">Erro: ${e.message}. Verifique se a Sheets API está ativada.</div>`);
  }finally{
    const ls=document.getElementById('lsc');
    ls.classList.add('hidden');
    setTimeout(()=>ls.remove(),500);
  }
}
init();
</script>
